name: Release (npm publish)

# Manually triggered: publishes every @gleanql/* package at the version in its
# package.json. Auth is npm trusted publishing (OIDC) — no token secret; each
# package on npmjs.com lists this repo + workflow as its trusted publisher.
# pnpm rewrites workspace:* dependency ranges to the real versions at publish
# time, and needs >=10.13 for the OIDC token exchange.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options: [latest, next, alpha]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: verify + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # No registry-url here: it writes a placeholder _authToken to .npmrc,
      # which preempts the OIDC exchange. The npm that ships with node 22 is
      # too old for trusted publishing (needs >=11.5.1), so upgrade it —
      # pnpm shells out to `npm publish` for the actual upload.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: npm install -g npm@^11

      - run: pnpm install --frozen-lockfile

      # The full gate before anything leaves the building.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - run: pnpm -r --filter "./packages/*" publish --access public --tag ${{ inputs.tag }} --no-git-checks
