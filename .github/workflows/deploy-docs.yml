name: Deploy docs

# Manually triggered: builds the docs RedwoodSDK app and deploys it to
# Cloudflare Workers. Requires the CLOUDFLARE_API_TOKEN repository secret
# (a token with Workers Scripts edit rights; wrangler reads it from the env).
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: build + wrangler deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @gleanql/docs release
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
