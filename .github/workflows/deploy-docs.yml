name: Deploy docs

# Deploys the docs RedwoodSDK app to Cloudflare Workers (gleanql.com) on every
# docs change that lands on main — plus on demand. Requires the
# CLOUDFLARE_API_TOKEN repository secret (Workers Scripts edit + the zone).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: build + wrangler deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @gleanql/site release
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account API tokens can't call the user-level /memberships discovery
          # endpoint — pin the account instead of letting wrangler guess.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
