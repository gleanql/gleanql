query Route($handle: String!) {
  collection(handle: $handle) {
    __typename
    id
    products_first12: products(first: 12) {
      __typename
      nodes {
        __typename
        id
        title
      }
    }
    products_first24: products(first: 24) {
      __typename
      nodes {
        __typename
        id
        title
      }
    }
  }
}
