query Route($search_query: String!) {
  search(query: $search_query) {
    __typename
    nodes {
      __typename
      ... on Product {
        __typename
        id
        title
        featuredImage {
          __typename
          url
        }
      }
      ... on Collection {
        __typename
        id
        title
        image {
          __typename
          url
        }
      }
    }
  }
}
